name: Auto Release Companion Installers

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: check
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — always release
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Manual tag push: v${VERSION}"
          else
            # Push to main — check package.json version
            VERSION=$(node -p "require('./package.json').version")
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Tag v${VERSION} already exists — skipping release"
            else
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "New version detected: v${VERSION} — will release"
            fi
          fi

  build-macos-pkg:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .pkg
        run: ./scripts/build-macos-pkg.sh "${{ needs.check-version.outputs.version }}"

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/installers/trapezohe-companion-macos.pkg

  build-macos-tray:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build macOS tray bundle
        run: ./scripts/build-tray-macos.sh "${{ needs.check-version.outputs.version }}"

      - name: Upload macOS tray artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-tray
          path: dist/installers/trapezohe-companion-tray-macos.zip

  build-windows-msi:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build .msi
        shell: pwsh
        run: ./scripts/build-windows-msi.ps1 -Version "${{ needs.check-version.outputs.version }}"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/installers/trapezohe-companion-windows.msi

  build-windows-tray:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows tray bundle
        shell: pwsh
        run: ./scripts/build-tray-windows.ps1 -Version "${{ needs.check-version.outputs.version }}"

      - name: Upload Windows tray artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-tray
          path: dist/installers/trapezohe-companion-tray-windows.zip

  publish-release:
    needs:
      - check-version
      - build-macos-pkg
      - build-macos-tray
      - build-windows-msi
      - build-windows-tray
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/release

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/release

      - name: Download macOS tray artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos-tray
          path: dist/release

      - name: Download Windows tray artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-windows-tray
          path: dist/release

      - name: Generate SHA256SUMS
        run: |
          cd dist/release
          sha256sum trapezohe-companion-macos.pkg > SHA256SUMS.txt
          sha256sum trapezohe-companion-windows.msi >> SHA256SUMS.txt
          sha256sum trapezohe-companion-tray-macos.zip >> SHA256SUMS.txt
          sha256sum trapezohe-companion-tray-windows.zip >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Git tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Trapezohe Companion v${{ needs.check-version.outputs.version }}
          files: |
            dist/release/trapezohe-companion-macos.pkg
            dist/release/trapezohe-companion-windows.msi
            dist/release/trapezohe-companion-tray-macos.zip
            dist/release/trapezohe-companion-tray-windows.zip
            dist/release/SHA256SUMS.txt
          body: |
            ## Trapezohe Companion v${{ needs.check-version.outputs.version }}

            Local companion daemon for the Trapezohe AI browser extension — plus the tray shell that surfaces runtime state for ordinary users.

            ---

            ## Download & Install

            | Platform | File | Type |
            |----------|------|------|
            | macOS | `trapezohe-companion-macos.pkg` | Daemon installer |
            | Windows | `trapezohe-companion-windows.msi` | Daemon installer |
            | macOS | `trapezohe-companion-tray-macos.zip` | Tray shell portable app bundle |
            | Windows | `trapezohe-companion-tray-windows.zip` | Tray shell portable executable |

            ---

            ## Verify Download (SHA256)

            **macOS / Linux:**
            ```bash
            shasum -a 256 ./trapezohe-companion-macos.pkg
            ```

            **Windows (PowerShell):**
            ```powershell
            Get-FileHash .\trapezohe-companion-windows.msi -Algorithm SHA256
            ```

            Compare the output against [`SHA256SUMS.txt`](https://github.com/trapezohe/companion/releases/download/v${{ needs.check-version.outputs.version }}/SHA256SUMS.txt) before running installers.

            ---

            ## Security Notice — First Launch

            Since these installers are not code-signed, your OS will show a security warning on first launch. This is expected for open-source software distributed outside app stores.

            ### macOS — Gatekeeper

            Double-clicking the `.pkg` file will show a warning:

            > "Apple could not verify whether trapezohe-companion-macos.pkg contains software that is harmful to your Mac or compromises your privacy."

            **To install:**

            1. Open **System Settings → Privacy & Security**
            2. Scroll down to the **Security** section
            3. You will see a message about the blocked installer — click **"Open Anyway"**
            4. Double-click the `.pkg` file again and it will install normally

            **Alternative** — Remove quarantine via Terminal (skip the dialog entirely):
            ```bash
            xattr -cr ~/Downloads/trapezohe-companion-macos.pkg
            ```

            ### Windows — SmartScreen

            When the SmartScreen popup appears:
            1. Click **"More info"**
            2. Click **"Run anyway"**

            ---

            ## After Installation

            The companion daemon starts automatically and pairs with the Trapezohe browser extension. No manual configuration needed.

            The tray shell bundle is optional. It gives users a visible status panel, lifecycle controls, and local diagnostics without opening Chrome.

            To verify it's running:
            ```bash
            # macOS / Linux
            curl -s -H "Authorization: Bearer <token>" http://127.0.0.1:41591/healthz | jq .

            # Windows (PowerShell)
            Invoke-RestMethod -Headers @{ Authorization = "Bearer <token>" } http://127.0.0.1:41591/healthz
            ```
