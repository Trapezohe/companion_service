name: Auto Release Companion Installers

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: check
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — always release
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Manual tag push: v${VERSION}"
          else
            # Push to main — check package.json version
            VERSION=$(node -p "require('./package.json').version")
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Tag v${VERSION} already exists — skipping release"
            else
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "New version detected: v${VERSION} — will release"
            fi
          fi

  test-node:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run companion Node test suite
        run: npm test

  test-tray:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tray Rust test suite
        run: cargo test --manifest-path tray/Cargo.toml --locked

  build-macos-pkg:
    needs:
      - check-version
      - test-node
      - test-tray
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64 }}
      APPLE_DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_PASSWORD }}
      APPLE_DEVELOPER_ID_APP_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_APP_IDENTITY }}
      APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 }}
      APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD }}
      APPLE_DEVELOPER_ID_INSTALLER_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER_IDENTITY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate macOS signing inputs
        run: |
          missing=()
          for name in \
            APPLE_ID \
            APPLE_TEAM_ID \
            APPLE_APP_SPECIFIC_PASSWORD \
            APPLE_DEVELOPER_ID_APP_P12_BASE64 \
            APPLE_DEVELOPER_ID_APP_P12_PASSWORD \
            APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64 \
            APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD \
            TAURI_SIGNING_PRIVATE_KEY
          do
            if [[ -z "${!name:-}" ]]; then
              missing+=("${name}")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required macOS signing secrets:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Import Apple Developer ID certificates
        run: |
          BREW_OPENSSL_PREFIX="$(brew --prefix openssl@3 2>/dev/null || true)"
          if [[ -z "${BREW_OPENSSL_PREFIX}" || ! -x "${BREW_OPENSSL_PREFIX}/bin/openssl" ]]; then
            brew install openssl@3
            BREW_OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          fi

          OPENSSL_BIN="${BREW_OPENSSL_PREFIX}/bin/openssl"
          "${OPENSSL_BIN}" version
          if ! "${OPENSSL_BIN}" pkcs12 -help 2>&1 | grep -q -- '-legacy'; then
            echo "OpenSSL 3 on the runner still does not support pkcs12 -legacy." >&2
            exit 1
          fi

          KEYCHAIN_PATH="${RUNNER_TEMP}/trapezohe-build.keychain-db"
          KEYCHAIN_PASSWORD="$("${OPENSSL_BIN}" rand -hex 16)"
          APP_P12="${RUNNER_TEMP}/developer-id-app.p12"
          APP_PEM="${RUNNER_TEMP}/developer-id-app.pem"
          INSTALLER_P12="${RUNNER_TEMP}/developer-id-installer.p12"
          INSTALLER_PEM="${RUNNER_TEMP}/developer-id-installer.pem"
          export APP_P12 APP_PEM INSTALLER_P12 INSTALLER_PEM OPENSSL_BIN

          python3 - <<'PY'
          import base64
          import binascii
          import os
          from pathlib import Path

          def decode_secret(name: str, output_path_env: str) -> None:
              value = os.environ[name].strip()
              if not value:
                  raise SystemExit(f"{name} is empty after trimming whitespace.")
              try:
                  decoded = base64.b64decode(value, validate=True)
              except binascii.Error as exc:
                  raise SystemExit(f"{name} is not valid base64: {exc}") from exc
              if not decoded:
                  raise SystemExit(f"{name} decoded to 0 bytes.")
              Path(os.environ[output_path_env]).write_bytes(decoded)

          decode_secret("APPLE_DEVELOPER_ID_APP_P12_BASE64", "APP_P12")
          decode_secret("APPLE_DEVELOPER_ID_INSTALLER_P12_BASE64", "INSTALLER_P12")
          PY

          ls -l "${APP_P12}" "${INSTALLER_P12}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}" login.keychain-db
          security default-keychain -d user -s "${KEYCHAIN_PATH}"

          "${OPENSSL_BIN}" pkcs12 -legacy \
            -in "${APP_P12}" \
            -passin "pass:${APPLE_DEVELOPER_ID_APP_P12_PASSWORD}" \
            -nodes \
            -out "${APP_PEM}"

          "${OPENSSL_BIN}" pkcs12 -legacy \
            -in "${INSTALLER_P12}" \
            -passin "pass:${APPLE_DEVELOPER_ID_INSTALLER_P12_PASSWORD}" \
            -nodes \
            -out "${INSTALLER_PEM}"

          ls -l "${APP_PEM}" "${INSTALLER_PEM}"

          security import "${APP_PEM}" \
            -k "${KEYCHAIN_PATH}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security import "${INSTALLER_PEM}" \
            -k "${KEYCHAIN_PATH}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          DETECTED_APP_IDENTITY="$("${OPENSSL_BIN}" x509 -in "${APP_PEM}" -noout -subject -nameopt RFC2253 | sed -n 's/^subject=.*CN=//p')"
          DETECTED_INSTALLER_IDENTITY="$("${OPENSSL_BIN}" x509 -in "${INSTALLER_PEM}" -noout -subject -nameopt RFC2253 | sed -n 's/^subject=.*CN=//p')"

          if [[ -z "${DETECTED_APP_IDENTITY}" || -z "${DETECTED_INSTALLER_IDENTITY}" ]]; then
            echo "Failed to detect Developer ID certificate identities from the provided .p12 files." >&2
            exit 1
          fi

          echo "DETECTED_APPLE_DEVELOPER_ID_APP_IDENTITY=${DETECTED_APP_IDENTITY}" >> "$GITHUB_ENV"
          echo "DETECTED_APPLE_DEVELOPER_ID_INSTALLER_IDENTITY=${DETECTED_INSTALLER_IDENTITY}" >> "$GITHUB_ENV"

      - name: Prepare macOS signing environment
        run: |
          APP_IDENTITY="${APPLE_DEVELOPER_ID_APP_IDENTITY:-${DETECTED_APPLE_DEVELOPER_ID_APP_IDENTITY:-}}"
          INSTALLER_IDENTITY="${APPLE_DEVELOPER_ID_INSTALLER_IDENTITY:-${DETECTED_APPLE_DEVELOPER_ID_INSTALLER_IDENTITY:-}}"
          SIGNING_ENV_FILE="${RUNNER_TEMP}/trapezohe-macos-signing.env"

          if [[ -z "${APP_IDENTITY}" || -z "${INSTALLER_IDENTITY}" ]]; then
            echo "Missing Developer ID identity names after certificate import." >&2
            exit 1
          fi

          TAURI_KEY_FILE="${RUNNER_TEMP}/tauri-updater-signing-key"
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" > "${TAURI_KEY_FILE}"

          {
            printf 'export APPLE_ID=%q\n' "${APPLE_ID}"
            printf 'export APPLE_TEAM_ID=%q\n' "${APPLE_TEAM_ID}"
            printf 'export APPLE_APP_SPECIFIC_PASSWORD=%q\n' "${APPLE_APP_SPECIFIC_PASSWORD}"
            printf 'export APPLE_DEVELOPER_ID_APP_IDENTITY=%q\n' "${APP_IDENTITY}"
            printf 'export APPLE_DEVELOPER_ID_INSTALLER_IDENTITY=%q\n' "${INSTALLER_IDENTITY}"
            printf 'export TAURI_PRIVATE_KEY_PATH=%q\n' "${TAURI_KEY_FILE}"
            printf 'export TAURI_PRIVATE_KEY_PASSWORD=%q\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}"
          } > "${SIGNING_ENV_FILE}"

          echo "TRAPEZOHE_MACOS_SIGNING_ENV_FILE=${SIGNING_ENV_FILE}" >> "$GITHUB_ENV"
          echo "TRAPEZOHE_UPDATER_ENV_FILE=${SIGNING_ENV_FILE}" >> "$GITHUB_ENV"

      - name: Build .pkg
        run: ./scripts/build-macos-pkg.sh "${{ needs.check-version.outputs.version }}"

      - name: Build macOS updater artifacts
        run: ./scripts/build-macos-updater-artifacts.sh "${{ needs.check-version.outputs.version }}"

      - name: Verify signed macOS release artifacts
        run: |
          pkgutil --check-signature dist/installers/trapezohe-companion-macos.pkg
          xcrun stapler validate dist/installers/trapezohe-companion-macos.pkg
          test -f dist/installers/trapezohe-companion-macos.app.tar.gz
          test -f dist/installers/trapezohe-companion-macos.app.tar.gz.sig
          python3 - <<'PY'
          import json
          from pathlib import Path

          latest = json.loads(Path("dist/installers/latest.json").read_text())
          platform = next(iter(latest["platforms"].values()))
          assert latest["version"] == "${{ needs.check-version.outputs.version }}"
          assert platform["url"].endswith("/trapezohe-companion-macos.app.tar.gz")
          assert platform["signature"]
          PY

      - name: Cleanup temporary keychain and signing env
        if: always()
        run: |
          if [[ -n "${TRAPEZOHE_MACOS_SIGNING_ENV_FILE:-}" ]]; then
            rm -f "${TRAPEZOHE_MACOS_SIGNING_ENV_FILE}"
          fi
          rm -f "${RUNNER_TEMP}/tauri-updater-signing-key" || true
          rm -f "${RUNNER_TEMP}/developer-id-app.p12" "${RUNNER_TEMP}/developer-id-installer.p12" "${RUNNER_TEMP}/developer-id-app.pem" "${RUNNER_TEMP}/developer-id-installer.pem" || true
          security default-keychain -d user -s login.keychain-db || true
          security list-keychains -d user -s login.keychain-db || true
          security delete-keychain "${RUNNER_TEMP}/trapezohe-build.keychain-db" || true

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/installers/trapezohe-companion-macos.pkg

      - name: Upload macOS updater artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-updater
          path: |
            dist/installers/trapezohe-companion-macos.app.tar.gz
            dist/installers/trapezohe-companion-macos.app.tar.gz.sig
            dist/installers/latest.json

  build-windows-msi:
    needs:
      - check-version
      - test-node
      - test-tray
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build .msi
        shell: pwsh
        run: ./scripts/build-windows-msi.ps1 -Version "${{ needs.check-version.outputs.version }}"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/installers/trapezohe-companion-windows.msi

  publish-release:
    needs:
      - check-version
      - build-macos-pkg
      - build-windows-msi
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/release

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/release

      - name: Download macOS updater artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos-updater
          path: dist/release

      - name: Generate SHA256SUMS
        run: |
          cd dist/release
          sha256sum trapezohe-companion-macos.pkg > SHA256SUMS.txt
          sha256sum trapezohe-companion-macos.app.tar.gz >> SHA256SUMS.txt
          sha256sum trapezohe-companion-windows.msi >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Git tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Trapezohe Companion v${{ needs.check-version.outputs.version }}
          files: |
            dist/release/trapezohe-companion-macos.pkg
            dist/release/trapezohe-companion-macos.app.tar.gz
            dist/release/trapezohe-companion-macos.app.tar.gz.sig
            dist/release/latest.json
            dist/release/trapezohe-companion-windows.msi
            dist/release/SHA256SUMS.txt
          body: |
            ## Trapezohe Companion v${{ needs.check-version.outputs.version }}

            Local companion daemon for the Trapezohe AI browser extension, bundled with the desktop tray panel for ordinary users.

            ---

            ## Download & Install

            | Platform | File | Type |
            |----------|------|------|
            | macOS | `trapezohe-companion-macos.pkg` | Installer for daemon + tray app |
            | macOS | `trapezohe-companion-macos.app.tar.gz` + `latest.json` | In-app updater feed for installed tray apps |
            | Windows | `trapezohe-companion-windows.msi` | Installer for daemon + tray app |

            ---

            ## Verify Download (SHA256)

            **macOS / Linux:**
            ```bash
            shasum -a 256 ./trapezohe-companion-macos.pkg
            ```

            **Windows (PowerShell):**
            ```powershell
            Get-FileHash .\trapezohe-companion-windows.msi -Algorithm SHA256
            ```

            Compare the output against [`SHA256SUMS.txt`](https://github.com/Trapezohe/companion_service/releases/download/v${{ needs.check-version.outputs.version }}/SHA256SUMS.txt) before running installers.

            ---

            ## Security Notice — First Launch

            The macOS installer is Developer ID signed and notarized, so the normal install flow should open directly on supported macOS systems.

            ### macOS — Signed installer

            If macOS still shows a warning, first confirm the file came from the official release page and matches `SHA256SUMS.txt`, then re-download and try again.

            ### Windows — SmartScreen

            When the SmartScreen popup appears:
            1. Click **"More info"**
            2. Click **"Run anyway"**

            ---

            ## After Installation

            The companion desktop tray panel is installed together with the daemon and pairs with the Trapezohe browser extension. No manual configuration is required for the default installer flow.

            After sign-in, the tray is the single desktop entry point: it surfaces local status, lifecycle controls, diagnostics, and daemon startup orchestration without opening Chrome.

            To verify it's running:
            ```bash
            # macOS / Linux
            curl -s -H "Authorization: Bearer <token>" http://127.0.0.1:41591/healthz | jq .

            # Windows (PowerShell)
            Invoke-RestMethod -Headers @{ Authorization = "Bearer <token>" } http://127.0.0.1:41591/healthz
            ```
