name: Auto Release Companion Installers

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version tag already exists
        id: check
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Manual tag push — always release
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Manual tag push: v${VERSION}"
          else
            # Push to main — check package.json version
            VERSION=$(node -p "require('./package.json').version")
            if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              echo "Tag v${VERSION} already exists — skipping release"
            else
              echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
              echo "New version detected: v${VERSION} — will release"
            fi
          fi

  build-macos-pkg:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build .pkg
        run: ./scripts/build-macos-pkg.sh "${{ needs.check-version.outputs.version }}"

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/installers/trapezohe-companion-macos.pkg

  build-windows-msi:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build .msi
        shell: pwsh
        run: ./scripts/build-windows-msi.ps1 -Version "${{ needs.check-version.outputs.version }}"

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/installers/trapezohe-companion-windows.msi

  publish-release:
    needs:
      - check-version
      - build-macos-pkg
      - build-windows-msi
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-macos-pkg
          path: dist/release

      - name: Download Windows installer artifact
        uses: actions/download-artifact@v4
        with:
          name: companion-windows-msi
          path: dist/release

      - name: Generate SHA256SUMS
        run: |
          cd dist/release
          sha256sum trapezohe-companion-macos.pkg > SHA256SUMS.txt
          sha256sum trapezohe-companion-windows.msi >> SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Git tag
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Trapezohe Companion v${{ needs.check-version.outputs.version }}
          files: |
            dist/release/trapezohe-companion-macos.pkg
            dist/release/trapezohe-companion-windows.msi
            dist/release/SHA256SUMS.txt
          body: |
            ## Trapezohe Companion v${{ needs.check-version.outputs.version }}

            Local companion daemon for the Trapezohe AI browser extension — MCP server host & command runtime.

            ---

            ## Download & Install

            | Platform | File | One-line Install |
            |----------|------|-----------------|
            | macOS | `trapezohe-companion-macos.pkg` | `curl -fsSL https://raw.githubusercontent.com/Trapezohe/companion_service/main/install.sh \| bash` |
            | Windows | `trapezohe-companion-windows.msi` | `irm https://raw.githubusercontent.com/Trapezohe/companion_service/main/install.ps1 \| iex` |

            ---

            ## Verify Download (SHA256)

            **macOS / Linux:**
            ```bash
            shasum -a 256 ./trapezohe-companion-macos.pkg
            ```

            **Windows (PowerShell):**
            ```powershell
            Get-FileHash .\trapezohe-companion-windows.msi -Algorithm SHA256
            ```

            Compare the output against [`SHA256SUMS.txt`](https://github.com/Trapezohe/companion_service/releases/download/v${{ needs.check-version.outputs.version }}/SHA256SUMS.txt) before running installers.

            ---

            ## Security Notice — First Launch

            Since these installers are not code-signed, your OS will show a security warning on first launch. This is expected for open-source software distributed outside app stores.

            ### macOS — Gatekeeper

            **Option A** — Right-click the `.pkg` file → "Open" → click "Open" in the dialog.

            **Option B** — Remove quarantine via Terminal:
            ```bash
            xattr -cr ~/Downloads/trapezohe-companion-macos.pkg
            ```
            Then double-click to install normally.

            **Option C** — If blocked after install, go to **System Settings → Privacy & Security** → scroll down → click **"Open Anyway"**.

            ### Windows — SmartScreen

            When the SmartScreen popup appears:
            1. Click **"More info"**
            2. Click **"Run anyway"**

            ---

            ## After Installation

            The companion daemon starts automatically and pairs with the Trapezohe browser extension. No manual configuration needed.

            To verify it's running:
            ```bash
            # macOS / Linux
            curl -s http://127.0.0.1:41591/api/health | jq .

            # Windows (PowerShell)
            Invoke-RestMethod http://127.0.0.1:41591/api/health
            ```
