<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trapezohe Companion</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0c1117;
        --surface: #161b22;
        --border: rgba(255, 255, 255, 0.08);
        --text: #e6edf3;
        --muted: #8b949e;
        --green: #3fb950;
        --yellow: #d29922;
        --red: #f85149;
        --blue: #58a6ff;
        --green-bg: rgba(63, 185, 80, 0.1);
        --yellow-bg: rgba(210, 153, 34, 0.1);
        --red-bg: rgba(248, 81, 73, 0.1);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-user-select: none;
        user-select: none;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }

      .header-title {
        font-size: 13px;
        font-weight: 600;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      .menu-btn {
        width: 32px;
        height: 32px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: background 120ms, color 120ms;
        position: relative;
      }

      .menu-btn:hover { background: #1f2937; color: var(--text); }

      /* ── Dropdown ── */
      .dropdown-anchor { position: relative; }

      .dropdown {
        display: none;
        position: absolute;
        top: 40px;
        right: 0;
        width: 220px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
        z-index: 100;
        padding: 6px;
        animation: dropdown-in 120ms ease-out;
      }

      .dropdown.open { display: block; }

      .dropdown-item {
        display: block;
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: none;
        color: var(--text);
        font: inherit;
        font-size: 13px;
        text-align: left;
        cursor: pointer;
        transition: background 80ms;
      }

      .dropdown-item:hover:not(:disabled) { background: rgba(255, 255, 255, 0.06); }
      .dropdown-item:disabled { color: var(--muted); opacity: 0.5; cursor: not-allowed; }
      .dropdown-item.danger { color: var(--red); }
      .dropdown-sep { height: 1px; background: var(--border); margin: 4px 8px; }

      @keyframes dropdown-in {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* ── Status Center ── */
      .status-center {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 48px 20px 24px;
      }

      .status-dot {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        margin-bottom: 20px;
        position: relative;
      }

      .status-dot::after {
        content: "";
        position: absolute;
        inset: -8px;
        border-radius: 50%;
        opacity: 0.2;
      }

      .status-dot.healthy { background: var(--green); }
      .status-dot.healthy::after { background: var(--green); }
      .status-dot.degraded, .status-dot.checking { background: var(--yellow); }
      .status-dot.degraded::after, .status-dot.checking::after { background: var(--yellow); }
      .status-dot.stopped, .status-dot.misconfigured { background: var(--red); }
      .status-dot.stopped::after, .status-dot.misconfigured::after { background: var(--red); }

      .status-dot.checking {
        animation: pulse 1.6s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .status-label {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
      }

      .status-sub {
        font-size: 13px;
        color: var(--muted);
        text-align: center;
        max-width: 280px;
        line-height: 1.5;
      }

      /* ── Info Cards ── */
      .info-section {
        padding: 0 20px 20px;
        display: grid;
        gap: 8px;
      }

      .info-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
      }

      .info-label {
        font-size: 13px;
        color: var(--muted);
      }

      .info-value {
        font-size: 13px;
        font-weight: 500;
        font-variant-numeric: tabular-nums;
      }

      /* ── Action Button ── */
      .primary-action {
        padding: 0 20px 20px;
      }

      .primary-btn {
        display: block;
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font: inherit;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 120ms;
      }

      .primary-btn:hover:not(:disabled) { opacity: 0.85; }
      .primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }

      .primary-btn.start { background: var(--green); color: #0c1117; }
      .primary-btn.stop { background: var(--red); color: #fff; }
      .primary-btn.restart { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

      /* ── Footer ── */
      .footer {
        padding: 12px 20px;
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .footer-text {
        font-size: 11px;
        color: var(--muted);
      }

      /* ── Banner ── */
      .banner {
        display: none;
        margin: 12px 20px 0;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(248, 81, 73, 0.2);
        background: var(--red-bg);
        color: var(--red);
        font-size: 13px;
        line-height: 1.4;
      }

      .banner.visible { display: block; }

      /* ── Startup note ── */
      .startup-note {
        display: none;
        margin: 0 20px 12px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid rgba(88, 166, 255, 0.15);
        background: rgba(88, 166, 255, 0.06);
        color: var(--blue);
        font-size: 12px;
        line-height: 1.4;
      }

      .startup-note.visible { display: block; }

      /* ── Update banner ── */
      .update-banner {
        display: none;
        margin: 12px 20px 0;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(63, 185, 80, 0.2);
        background: rgba(63, 185, 80, 0.08);
        cursor: pointer;
        transition: background 120ms;
      }

      .update-banner:hover { background: rgba(63, 185, 80, 0.14); }
      .update-banner.visible { display: flex; align-items: center; justify-content: space-between; gap: 10px; }

      .update-text {
        font-size: 13px;
        color: var(--green);
        font-weight: 500;
      }

      .update-action {
        font-size: 12px;
        color: var(--green);
        opacity: 0.7;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <span class="header-title">TRAPEZOHE COMPANION</span>
      <div class="dropdown-anchor">
        <button class="menu-btn" id="menuBtn">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="8" cy="3" r="1"/><circle cx="8" cy="8" r="1"/><circle cx="8" cy="13" r="1"/>
          </svg>
        </button>
        <div class="dropdown" id="dropdown"></div>
      </div>
    </header>

    <div class="banner" id="banner"></div>
    <div class="update-banner" id="updateBanner"></div>

    <section class="status-center" id="statusCenter">
      <div class="status-dot checking"></div>
      <div class="status-label">Checking</div>
      <div class="status-sub">Connecting to local companion runtime...</div>
    </section>

    <div class="startup-note" id="startupNote"></div>

    <section class="info-section" id="infoSection"></section>

    <section class="primary-action" id="primaryAction"></section>

    <footer class="footer">
      <span class="footer-text" id="footerText">Awaiting status</span>
    </footer>

    <script>
      const tauri = window.__TAURI__ || {};
      const invoke = tauri.core?.invoke;
      const listen = tauri.event?.listen;

      const state = { snapshot: null, busy: false };

      const $ = (id) => document.getElementById(id);
      const esc = (v) => String(v ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

      function relativeTime(ts) {
        if (!ts) return 'Awaiting status';
        const diff = Math.max(0, Date.now() - Number(ts));
        if (diff < 10000) return 'Updated just now';
        const s = Math.floor(diff / 1000);
        if (s < 60) return `Updated ${s}s ago`;
        const m = Math.floor(s / 60);
        if (m < 60) return `Updated ${m}m ago`;
        return `Updated ${Math.floor(m / 60)}h ago`;
      }

      function statusMeta(snapshot) {
        const kind = snapshot?.state?.kind || 'checking';
        const map = {
          healthy:       { label: 'Running',       css: 'healthy' },
          degraded:      { label: 'Needs Attention', css: 'degraded' },
          stopped:       { label: 'Stopped',       css: 'stopped' },
          misconfigured: { label: 'Setup Needed',  css: 'misconfigured' },
          checking:      { label: 'Checking',      css: 'checking' },
        };
        return map[kind] || map.checking;
      }

      function statusSub(snapshot) {
        const kind = snapshot?.state?.kind || 'checking';
        const reason = snapshot?.state?.reason;
        if (reason) return reason;
        if (kind === 'healthy') {
          const port = snapshot?.endpoint?.match(/:(\d+)/)?.[1] || '41591';
          return `Service is online at port ${port}`;
        }
        if (kind === 'stopped') return 'Service is not running';
        if (kind === 'misconfigured') return 'Configuration needs repair';
        return 'Connecting to local runtime...';
      }

      function renderStatus(snapshot) {
        const meta = statusMeta(snapshot);
        const center = $('statusCenter');
        center.innerHTML = `
          <div class="status-dot ${meta.css}"></div>
          <div class="status-label">${esc(meta.label)}</div>
          <div class="status-sub">${esc(statusSub(snapshot))}</div>
        `;
      }

      function renderInfo(snapshot) {
        const kind = snapshot?.state?.kind || 'checking';
        const health = snapshot?.health || snapshot?.state || {};
        const diag = snapshot?.diagnostics || {};
        const rows = [];

        const version = health.version || snapshot?.state?.version;
        if (version) rows.push(['Version', `v${version}`]);

        const port = snapshot?.endpoint?.match(/:(\d+)/)?.[1];
        if (port) rows.push(['Port', port]);

        const mcpServers = diag.connected_mcp_servers ?? health.mcp_servers;
        if (mcpServers != null) rows.push(['MCP Servers', mcpServers]);

        const mcpTools = diag.total_mcp_tools ?? health.mcp_tools;
        if (mcpTools != null) rows.push(['MCP Tools', mcpTools]);

        const sessions = diag.running_acp_sessions;
        if (sessions != null) rows.push(['Active Sessions', sessions]);

        const approvals = diag.pending_approvals;
        if (approvals != null && approvals > 0) rows.push(['Pending Approvals', approvals]);

        const pid = health.pid ?? snapshot?.state?.pid;
        if (pid && kind === 'healthy') rows.push(['PID', pid]);

        $('infoSection').innerHTML = rows.length
          ? rows.map(([l, v]) => `
              <div class="info-row">
                <span class="info-label">${esc(l)}</span>
                <span class="info-value">${esc(v)}</span>
              </div>`).join('')
          : '';
      }

      function renderStartupNote(snapshot) {
        const note = snapshot?.startup?.note;
        const phase = snapshot?.startup?.phase;
        const el = $('startupNote');
        if (note && (phase === 'ensuring' || phase === 'attention')) {
          el.textContent = note;
          el.classList.add('visible');
        } else {
          el.classList.remove('visible');
        }
      }

      function renderPrimaryAction(snapshot) {
        const actions = snapshot?.actions || {};
        const kind = snapshot?.state?.kind || 'checking';
        let html = '';

        if (kind === 'stopped' || kind === 'misconfigured') {
          html = `<button class="primary-btn start" data-cmd="start_service" ${!actions.can_start || state.busy ? 'disabled' : ''}>Start Service</button>`;
        } else if (kind === 'healthy') {
          html = `<button class="primary-btn restart" data-cmd="restart_service" ${!actions.can_restart || state.busy ? 'disabled' : ''}>Restart Service</button>`;
        }

        $('primaryAction').innerHTML = html;
      }

      function renderDropdown(snapshot) {
        const actions = snapshot?.actions || {};
        const kind = snapshot?.state?.kind || 'checking';
        const autostartEnabled = Boolean(snapshot?.autostart?.enabled);
        const items = [];

        if (kind === 'healthy' || kind === 'degraded') {
          items.push({ label: 'Stop Service', cmd: 'stop_service', disabled: !actions.can_stop, cls: 'danger' });
          items.push({ label: 'Restart Service', cmd: 'restart_service', disabled: !actions.can_restart });
        } else {
          items.push({ label: 'Start Service', cmd: 'start_service', disabled: !actions.can_start });
        }

        items.push({ sep: true });
        items.push({ label: 'Refresh Status', cmd: 'refresh_status_snapshot' });
        items.push({ label: 'Run Self-Check', cmd: 'run_self_check', disabled: !actions.can_run_self_check });
        items.push({ label: 'Open Logs Folder', cmd: 'open_logs', disabled: !actions.can_open_logs });
        items.push({ sep: true });
        items.push({
          label: autostartEnabled ? 'Disable Autostart' : 'Enable Autostart',
          cmd: 'set_autostart_enabled',
          payload: { enabled: !autostartEnabled },
          disabled: !actions.can_toggle_autostart,
        });

        // Self-check repair actions
        const repairs = snapshot?.self_check?.repair_actions || [];
        if (repairs.length) {
          items.push({ sep: true });
          for (const r of repairs) {
            items.push({ label: `Repair: ${r.title || r.id}`, repair: r.id });
          }
        }

        items.push({ sep: true });
        items.push({ label: 'Check for Updates', cmd: 'check_update' });
        items.push({ label: 'Quit Tray', special: 'quit' });

        $('dropdown').innerHTML = items.map((item) => {
          if (item.sep) return '<div class="dropdown-sep"></div>';
          const dis = item.disabled || state.busy ? 'disabled' : '';
          const cls = item.cls ? ` ${item.cls}` : '';
          if (item.repair) {
            return `<button class="dropdown-item${cls}" data-repair="${esc(item.repair)}" ${dis}>${esc(item.label)}</button>`;
          }
          if (item.special === 'quit') {
            return `<button class="dropdown-item" data-quit="1">${esc(item.label)}</button>`;
          }
          const payload = item.payload ? ` data-payload='${JSON.stringify(item.payload)}'` : '';
          return `<button class="dropdown-item${cls}" data-cmd="${esc(item.cmd)}"${payload} ${dis}>${esc(item.label)}</button>`;
        }).join('');
      }

      function isVersionNewer(latest, current) {
        if (!latest || !current) return false;
        const parse = (v) => (v.replace(/^v/, '')).split('.').map(Number);
        const l = parse(latest), c = parse(current);
        if (l.length < 3 || c.length < 3) return false;
        for (let i = 0; i < 3; i++) {
          if (l[i] > c[i]) return true;
          if (l[i] < c[i]) return false;
        }
        return false;
      }

      function renderUpdate(snapshot) {
        const update = snapshot?.update;
        const el = $('updateBanner');
        // Double-check: only show banner if latest_version is actually newer
        // than current_version. This prevents stale update state from showing
        // after the user has already updated.
        const trulyNewer = update?.available
          && isVersionNewer(update.latest_version, update.current_version);
        if (trulyNewer) {
          el.innerHTML = `
            <span class="update-text">v${esc(update.latest_version)} available</span>
            <span class="update-action">Download &rarr;</span>
          `;
          el.classList.add('visible');
        } else {
          el.classList.remove('visible');
        }
      }

      function render(snapshot) {
        state.snapshot = snapshot;
        renderUpdate(snapshot);
        renderStatus(snapshot);
        renderInfo(snapshot);
        renderStartupNote(snapshot);
        renderPrimaryAction(snapshot);
        renderDropdown(snapshot);
        $('footerText').textContent = relativeTime(snapshot?.checked_at_ms);
      }

      function setBanner(msg, visible) {
        const el = $('banner');
        el.textContent = msg || '';
        el.classList.toggle('visible', Boolean(visible && msg));
      }

      async function runCommand(cmd, payload) {
        if (!invoke) { setBanner('Tauri bridge unavailable.', true); return; }
        state.busy = true;
        render(state.snapshot || {});
        setBanner('', false);
        try {
          const result = await invoke(cmd, payload || {});
          if (result?.state) render(result);
        } catch (e) {
          setBanner(String(e), true);
        } finally {
          state.busy = false;
          render(state.snapshot || {});
        }
      }

      // Menu toggle
      const menuBtn = $('menuBtn');
      const dropdown = $('dropdown');
      menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropdown.classList.toggle('open');
      });
      document.addEventListener('click', () => dropdown.classList.remove('open'));
      dropdown.addEventListener('click', (e) => e.stopPropagation());

      // Dropdown actions
      dropdown.addEventListener('click', async (e) => {
        const btn = e.target.closest('button');
        if (!btn || btn.disabled) return;
        dropdown.classList.remove('open');

        if (btn.dataset.quit) {
          if (invoke) await invoke('quit_tray').catch(() => {});
          return;
        }
        if (btn.dataset.repair) {
          await runCommand('run_repair', { action: btn.dataset.repair });
          return;
        }
        if (btn.dataset.cmd) {
          const payload = btn.dataset.payload ? JSON.parse(btn.dataset.payload) : undefined;
          await runCommand(btn.dataset.cmd, payload);
        }
      });

      // Update banner click
      $('updateBanner').addEventListener('click', async () => {
        if (invoke) await invoke('open_release_page').catch(() => {});
      });

      // Primary action button
      $('primaryAction').addEventListener('click', async (e) => {
        const btn = e.target.closest('button[data-cmd]');
        if (!btn || btn.disabled) return;
        await runCommand(btn.dataset.cmd);
      });

      // Bootstrap
      async function bootstrap() {
        if (!invoke) {
          setBanner('This panel must run inside the Tauri tray shell.', true);
          return;
        }
        const initial = await invoke('get_status_snapshot');
        render(initial);
        if (listen) {
          await listen('companion://status', (e) => {
            if (e?.payload) render(e.payload);
          });
        }
      }

      bootstrap().catch((e) => setBanner(String(e), true));
    </script>
  </body>
</html>
